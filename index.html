<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cambridge Countries</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7ff;
      --panel: #ffffff;
      --ink: #1b1c3a;
      --muted: #6f7190;
      --line: #dfe3ff;
      --purple: #6b45e8;
      --purple-dark: #4e2fc4;
      --blue: #2478ff;
      --sky: #e9f0ff;
      --pink: #f4589a;
      --red: #cb3f62;
      --shadow: 0 22px 55px rgba(65, 70, 140, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(107, 69, 232, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(36, 120, 255, 0.16), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .shell {
      display: grid;
      gap: 18px;
    }

    .topbar {
      align-items: center;
      display: flex;
      gap: 16px;
      justify-content: space-between;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: 0;
      line-height: 1.1;
      margin: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .login {
      margin: 11vh auto 0;
      max-width: 430px;
      padding: 26px;
    }

    .login h1 {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login h1 {
      font-size: 1.8rem;
      margin: 0 0 8px;
    }

    .login p {
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 22px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    label {
      color: var(--muted);
      display: grid;
      font-size: 0.82rem;
      font-weight: 700;
      gap: 7px;
      text-transform: uppercase;
    }

    input {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      min-height: 44px;
      outline: none;
      padding: 0 12px;
      width: 100%;
    }

    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(107, 69, 232, 0.16);
    }

    .primary,
    .secondary,
    .danger {
      align-items: center;
      border-radius: 8px;
      display: inline-flex;
      font-weight: 800;
      justify-content: center;
      min-height: 42px;
      padding: 0 15px;
    }

    .primary {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
    }

    .primary:hover {
      background: linear-gradient(135deg, var(--purple-dark), #1564df);
    }

    .secondary {
      background: var(--sky);
      color: var(--purple-dark);
    }

    .danger {
      background: #fff0f6;
      color: var(--red);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .error {
      color: var(--red);
      font-weight: 700;
      min-height: 22px;
    }

    .success {
      color: var(--purple-dark);
      font-weight: 800;
      min-height: 22px;
    }

    .dashboard {
      display: none;
    }

    .hero {
      background:
        linear-gradient(135deg, rgba(107, 69, 232, 0.96), rgba(36, 120, 255, 0.92)),
        var(--panel);
      color: #fff;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr auto;
      padding: 22px;
    }

    .home-view {
      min-height: 360px;
    }

    .home-view .hero {
      align-items: center;
      min-height: 300px;
      padding: clamp(26px, 7vw, 54px);
    }

    .hero .meta {
      color: rgba(255, 255, 255, 0.78);
    }

    .balance {
      display: grid;
      gap: 5px;
    }

    .balance small {
      color: rgba(255, 255, 255, 0.78);
      font-weight: 800;
      text-transform: uppercase;
    }

    .balance strong {
      font-size: clamp(2.1rem, 7vw, 4.5rem);
      letter-spacing: 0;
      line-height: 1;
    }

    .balance .home-caption {
      color: rgba(255, 255, 255, 0.86);
      font-size: 1rem;
      line-height: 1.45;
      max-width: 520px;
    }

    .pay-launch {
      align-self: end;
      background: #fff;
      color: var(--purple-dark);
      font-size: 1.05rem;
      min-height: 54px;
      padding: 0 24px;
    }

    .pill {
      align-items: center;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      color: #fff;
      display: inline-flex;
      font-weight: 800;
      min-height: 34px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .tabs {
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px;
    }

    .tab {
      background: transparent;
      border-radius: 8px;
      color: var(--muted);
      font-weight: 850;
      min-height: 42px;
      padding: 0 13px;
      white-space: nowrap;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
    }

    .view {
      display: none;
      gap: 18px;
    }

    .view.active {
      display: grid;
    }

    .content-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.1fr);
    }

    .transactions-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(280px, 0.8fr) minmax(0, 1.2fr);
    }

    .section {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .section h2,
    .section h3 {
      font-size: 1.05rem;
      line-height: 1.2;
      margin: 0;
    }

    .section p {
      color: var(--muted);
      line-height: 1.45;
      margin: 0;
    }

    .form-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 150px;
    }

    .country-list,
    .people-list,
    .transaction-list,
    .government-list {
      display: grid;
      gap: 12px;
    }

    .country-list {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      padding: 13px;
    }

    .item:hover {
      border-color: #c9d1ff;
      box-shadow: 0 10px 28px rgba(65, 70, 140, 0.08);
    }

    .item-head {
      align-items: start;
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }

    .item-title {
      display: grid;
      gap: 3px;
    }

    .item-title strong {
      line-height: 1.2;
    }

    .item-title span,
    .meta {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .money {
      color: var(--purple-dark);
      font-weight: 900;
      white-space: nowrap;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }

    .privacy-chip {
      background: #f3f1ff;
      border: 1px solid #ddd7ff;
      border-radius: 999px;
      color: var(--purple-dark);
      display: inline-flex;
      font-size: 0.82rem;
      font-weight: 800;
      min-height: 30px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .two {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    .loading-screen {
      align-items: center;
      backdrop-filter: blur(10px);
      background: rgba(246, 247, 255, 0.76);
      display: none;
      inset: 0;
      justify-content: center;
      padding: 22px;
      position: fixed;
      z-index: 20;
    }

    .modal-screen {
      align-items: center;
      backdrop-filter: blur(12px);
      background: rgba(27, 28, 58, 0.42);
      display: none;
      inset: 0;
      justify-content: center;
      padding: 18px;
      position: fixed;
      z-index: 15;
    }

    .modal-screen.show {
      display: flex;
    }

    .pay-dialog {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      padding: 18px;
      width: min(720px, 100%);
    }

    .pay-head {
      align-items: start;
      display: flex;
      gap: 14px;
      justify-content: space-between;
    }

    .person-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .person-choice {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      display: grid;
      gap: 4px;
      min-height: 76px;
      padding: 12px;
      text-align: left;
    }

    .person-choice.selected {
      background: #f4f2ff;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(107, 69, 232, 0.12);
    }

    .tax-preview {
      background: var(--sky);
      border: 1px solid #d8e2ff;
      border-radius: 8px;
      color: var(--ink);
      display: grid;
      gap: 6px;
      padding: 12px;
    }

    .loading-screen.show {
      display: flex;
    }

    .loading-card {
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      justify-items: center;
      padding: 24px;
      text-align: center;
      width: min(320px, 100%);
    }

    .spinner {
      animation: spin 0.8s linear infinite;
      border: 4px solid #e4e8ff;
      border-top-color: var(--purple);
      border-radius: 50%;
      height: 42px;
      width: 42px;
    }

    .loading-card strong {
      color: var(--ink);
    }

    .loading-card span {
      color: var(--muted);
      line-height: 1.4;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 820px) {
      .app {
        width: min(100% - 22px, 1180px);
        padding: 16px 0;
      }

      .content-grid,
      .transactions-grid,
      .hero,
      .form-row,
      .two {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <div id="loadingScreen" class="loading-screen" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <strong id="loadingTitle">Processing</strong>
      <span id="loadingText">Getting Cambridge Countries ready...</span>
    </div>
  </div>

  <main class="app">
    <section id="loginView" class="login panel">
      <h1>Cambridge Countries</h1>
      <p>Check your balance, send money, and manage your country in one place.</p>
      <form id="loginForm" class="grid">
        <label>
          Login name
          <input id="loginUsername" autocomplete="username" required>
        </label>
        <label>
          Secret code
          <input id="loginPassword" autocomplete="current-password" type="password" required>
        </label>
        <button class="primary" type="submit">Enter</button>
        <div id="loginError" class="error"></div>
      </form>
    </section>

    <section id="dashboardView" class="dashboard shell">
      <header class="topbar">
        <div class="brand">
          <h1>Cambridge Countries</h1>
          <span id="welcomeText"></span>
        </div>
        <button id="logoutButton" class="danger" type="button">Leave</button>
      </header>

      <nav id="tabs" class="tabs" aria-label="Main tabs"></nav>

      <section id="homeView" class="view active home-view">
        <section class="hero panel">
          <div class="balance">
            <small>Your Money</small>
            <strong id="balanceText">0</strong>
            <span id="countryText" class="meta"></span>
            <span class="home-caption">This is your private balance. Other people cannot see how much money you have.</span>
          </div>
          <div id="governmentPill" class="pill hidden"></div>
        </section>
      </section>

      <section id="transactionsView" class="view">
        <div class="transactions-grid">
          <form id="sendForm" class="section panel">
            <h2>Send Money</h2>
            <label>
              Send to
              <input id="sendTo" list="accountList" required>
            </label>
            <div class="form-row">
              <label>
                Amount
                <input id="sendAmount" inputmode="decimal" min="0.01" step="0.01" type="number" required>
              </label>
              <label>
                Message
                <input id="sendNote" maxlength="160">
              </label>
            </div>
            <button class="primary" type="submit">Send Money</button>
            <div id="sendMessage" class="success"></div>
          </form>

          <section class="section panel">
            <h2>Transactions</h2>
            <div id="transactionList" class="transaction-list"></div>
          </section>
        </div>
      </section>

      <section id="governmentView" class="view">
        <div id="governmentList" class="government-list"></div>
      </section>

      <section id="countriesView" class="view">
        <div id="countryList" class="country-list"></div>
      </section>

    </section>

    <datalist id="accountList"></datalist>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwvp9RXbqZOdMQi23_nUWNaPGibMZutRmMTOzvuxq87sUHn6Opk6EWb4IFmAY1ZroROQg/exec';
    const SESSION_KEY = 'cambridgeCountriesToken';

    const state = {
      token: localStorage.getItem(SESSION_KEY) || '',
      data: null,
      activeTab: 'home',
      loadingCount: 0
    };

    const tabs = [
      { id: 'home', label: 'Home' },
      { id: 'transactions', label: 'Transactions' },
      { id: 'countries', label: 'Countries' },
      { id: 'government', label: 'Government Account', needsGovernment: true }
    ];

    const $ = (id) => document.getElementById(id);

    $('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      $('loginError').textContent = '';
      await run(async () => {
        const response = await api({
          action: 'login',
          username: $('loginUsername').value,
          password: $('loginPassword').value
        });
        receiveDashboard(response);
      }, 'loginError', null, 'Opening Cambridge Countries...');
    });

    $('sendForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      $('sendMessage').textContent = '';
      await run(async () => {
        const response = await api({
          action: 'sendPersonal',
          token: state.token,
          toUsername: $('sendTo').value,
          amount: $('sendAmount').value,
          note: $('sendNote').value
        });
        receiveDashboard(response);
        $('sendForm').reset();
        $('sendMessage').textContent = 'Sent. Your balance is updated.';
      }, 'sendMessage', null, 'Sending money...');
    });

    $('logoutButton').addEventListener('click', async () => {
      const token = state.token;
      state.token = '';
      state.data = null;
      localStorage.removeItem(SESSION_KEY);
      showLogin();
      if (token) {
        setLoading(true, 'Signing out...');
        try {
          await api({ action: 'logout', token });
        } catch (error) {
          console.warn(error);
        } finally {
          setLoading(false);
        }
      }
    });

    boot();

    async function boot() {
      if (!API_URL) {
        $('loginError').textContent = 'Cambridge Countries needs to be connected before you can log in.';
        return;
      }

      if (!state.token) {
        showLogin();
        return;
      }

      await run(async () => {
        const response = await api({ action: 'dashboard', token: state.token });
        receiveDashboard(response);
      }, 'loginError', () => {
        localStorage.removeItem(SESSION_KEY);
        state.token = '';
        showLogin();
      }, 'Refreshing Cambridge Countries...');
    }

    async function api(payload) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (!data.ok) throw new Error(data.error || 'Something went wrong.');
        return data;
      } catch (error) {
        return jsonpApi(payload);
      }
    }

    function jsonpApi(payload) {
      return new Promise((resolve, reject) => {
        const callback = `bankCallback${Date.now()}${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error('The server did not respond.'));
        }, 20000);

        window[callback] = (data) => {
          cleanup();
          if (!data.ok) {
            reject(new Error(data.error || 'Something went wrong.'));
            return;
          }
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Could not reach the server.'));
        };

        script.src = `${API_URL}?callback=${encodeURIComponent(callback)}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
        document.body.appendChild(script);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callback];
          script.remove();
        }
      });
    }

    async function run(work, messageId, onError, loadingText) {
      setLoading(true, loadingText);
      try {
        await work();
      } catch (error) {
        $(messageId).textContent = error.message || String(error);
        if (onError) onError(error);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading, text) {
      if (isLoading) {
        state.loadingCount += 1;
        $('loadingText').textContent = text || 'Getting Cambridge Countries ready...';
      } else {
        state.loadingCount = Math.max(0, state.loadingCount - 1);
      }

      $('loadingScreen').classList.toggle('show', state.loadingCount > 0);
      document.querySelectorAll('button, input').forEach((element) => {
        element.disabled = state.loadingCount > 0;
      });
    }

    function receiveDashboard(response) {
      state.token = response.token || state.token;
      state.data = response;
      localStorage.setItem(SESSION_KEY, state.token);
      render();
    }

    function showLogin() {
      $('loginView').style.display = 'block';
      $('dashboardView').style.display = 'none';
    }

    function showDashboard() {
      $('loginView').style.display = 'none';
      $('dashboardView').style.display = 'grid';
    }

    function render() {
      const data = state.data;
      if (!data) return showLogin();

      showDashboard();
      const user = data.user;
      $('welcomeText').textContent = `${user.displayName} · ${user.countryName || user.countryId}`;
      $('balanceText').textContent = formatMoney(user.balance, user.currencyName);
      $('countryText').textContent = `${user.countryName || user.countryId} · ${user.currencyName}`;

      if (data.governmentCountries.length) {
        $('governmentPill').classList.remove('hidden');
        $('governmentPill').textContent = `Government account unlocked`;
      } else {
        $('governmentPill').classList.add('hidden');
      }

      if (!data.governmentCountries.length && state.activeTab === 'government') {
        state.activeTab = 'home';
      }

      renderTabs();
      renderAccounts();
      renderGovernments();
      renderCountries();
      renderTransactions();
    }

    function renderTabs() {
      $('tabs').innerHTML = '';
      tabs
        .filter((tab) => !tab.needsGovernment || state.data.governmentCountries.length)
        .forEach((tab) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `tab${state.activeTab === tab.id ? ' active' : ''}`;
          button.textContent = tab.label;
          button.addEventListener('click', () => {
            state.activeTab = tab.id;
            renderTabs();
            document.querySelectorAll('.view').forEach((view) => view.classList.remove('active'));
            $(`${tab.id}View`).classList.add('active');
          });
          $('tabs').appendChild(button);
        });

      document.querySelectorAll('.view').forEach((view) => view.classList.remove('active'));
      $(`${state.activeTab}View`).classList.add('active');
    }

    function renderAccounts() {
      const data = state.data;
      $('accountList').innerHTML = '';

      data.accounts.forEach((account) => {
        const option = document.createElement('option');
        option.value = account.username;
        option.label = account.displayName;
        $('accountList').appendChild(option);
      });
    }

    function renderGovernments() {
      $('governmentList').innerHTML = '';

      state.data.governmentCountries.forEach((country) => {
        const countryTransactions = (state.data.governmentTransactions || [])
          .filter((tx) => tx.countryId === country.countryId);
        const card = document.createElement('section');
        card.className = 'section panel';
        card.innerHTML = `
          <div class="item-head">
            <div class="item-title">
              <h2>${escapeHtml(country.countryName)} Government Account</h2>
              <span>${escapeHtml(country.currencyName)} · Country funds</span>
            </div>
            <div class="money">${formatMoney(country.governmentBalance, country.currencyName)}</div>
          </div>

          <form class="grid government-send" data-country-id="${escapeHtml(country.countryId)}">
            <h3>Send From Government Account</h3>
            <div class="form-row">
              <label>
                Send to
                <input name="toUsername" list="accountList" required>
              </label>
              <label>
                Amount
                <input name="amount" inputmode="decimal" min="0.01" step="0.01" type="number" required>
              </label>
            </div>
            <label>
              Message
              <input name="note" maxlength="160">
            </label>
            <button class="primary" type="submit">Send Government Money</button>
            <div class="success" data-message></div>
          </form>

          <form class="grid country-edit" data-country-id="${escapeHtml(country.countryId)}">
            <h3>Edit Country</h3>
            <div class="two">
              <label>
                Country name
                <input name="countryName" value="${escapeAttr(country.countryName)}" required>
              </label>
              <label>
                Currency name
                <input name="currencyName" value="${escapeAttr(country.currencyName)}" required>
              </label>
            </div>
            <button class="secondary" type="submit">Save Country</button>
            <div class="success" data-message></div>
          </form>

          <div class="grid">
            <h3>Government Transactions</h3>
            <div class="transaction-list">
              ${countryTransactions.length ? countryTransactions.map(transactionCardHtml).join('') : '<div class="empty">No government money has moved yet.</div>'}
            </div>
          </div>
        `;
        $('governmentList').appendChild(card);
      });

      document.querySelectorAll('.government-send').forEach((form) => {
        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          const message = form.querySelector('[data-message]');
          message.textContent = '';
          await run(async () => {
            const response = await api({
              action: 'sendGovernment',
              token: state.token,
              countryId: form.dataset.countryId,
              toUsername: form.elements.toUsername.value,
              amount: form.elements.amount.value,
              note: form.elements.note.value
            });
            receiveDashboard(response);
            message.textContent = 'Government money sent.';
          }, message.id || assignTempId(message), null, 'Sending government money...');
        });
      });

      document.querySelectorAll('.country-edit').forEach((form) => {
        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          const message = form.querySelector('[data-message]');
          message.textContent = '';
          await run(async () => {
            const response = await api({
              action: 'updateCountry',
              token: state.token,
              countryId: form.dataset.countryId,
              countryName: form.elements.countryName.value,
              currencyName: form.elements.currencyName.value
            });
            receiveDashboard(response);
            message.textContent = 'Country details saved.';
          }, message.id || assignTempId(message), null, 'Saving country details...');
        });
      });
    }

    function renderCountries() {
      $('countryList').innerHTML = '';

      state.data.countries.forEach((country) => {
        const card = document.createElement('section');
        card.className = 'section panel';
        card.innerHTML = `
          <div class="item-head">
            <div class="item-title">
              <h2>${escapeHtml(country.countryName)}</h2>
              <span>${escapeHtml(country.countryId)} · ${escapeHtml(country.currencyName)}</span>
            </div>
            <div class="meta">${country.people.length} ${country.people.length === 1 ? 'person' : 'people'}</div>
          </div>
          <div class="people-list">
            ${country.people.length ? country.people.map((person) => `
              <article class="item">
                <div class="item-head">
                  <div class="item-title">
                    <strong>${escapeHtml(person.displayName)}</strong>
                    <span>${escapeHtml(person.username)}</span>
                  </div>
                  <div class="privacy-chip">Private balance</div>
                </div>
              </article>
            `).join('') : '<div class="empty">This country is waiting for its first person.</div>'}
          </div>
        `;
        $('countryList').appendChild(card);
      });
    }

    function renderTransactions() {
      const transactions = state.data.transactions;
      $('transactionList').innerHTML = '';

      if (!transactions.length) {
        $('transactionList').innerHTML = '<div class="empty">No money has moved yet.</div>';
        return;
      }

      transactions.forEach((tx) => {
        $('transactionList').insertAdjacentHTML('beforeend', transactionCardHtml(tx));
      });
    }

    function transactionCardHtml(tx) {
      return `
        <article class="item">
          <div class="item-head">
            <div class="item-title">
              <strong>${escapeHtml(tx.sourceName)} → ${escapeHtml(tx.targetName)}</strong>
              <span>${formatDate(tx.timestamp)} · ${escapeHtml(tx.note || 'No message')}</span>
            </div>
            <div class="money">${formatMoney(tx.amount, tx.currencyName)}</div>
          </div>
          <div class="meta">${escapeHtml(transactionKind(tx))} · ${escapeHtml(countryNameFor(tx.countryId))}</div>
        </article>
      `;
    }

    function transactionKind(tx) {
      if (tx.sourceType === 'GOVERNMENT' || tx.targetType === 'GOVERNMENT') {
        return 'Government transfer';
      }
      return 'Personal transfer';
    }

    function countryNameFor(countryId) {
      const country = state.data.countries.find((item) => item.countryId === countryId);
      return country ? country.countryName : countryId;
    }

    function assignTempId(element) {
      element.id = `message-${Math.random().toString(36).slice(2)}`;
      return element.id;
    }

    function formatMoney(amount, currencyName) {
      return `${Number(amount || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })} ${currencyName || 'money'}`;
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value || '');
      return date.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
